<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 12.4 - Search & Filter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: #1e1e2e;
            color: #cdd6f4;
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #89b4fa;
            margin-bottom: 25px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 25px;
        }

        .controls input,
        .controls select {
            padding: 10px 15px;
            border-radius: 8px;
            border: none;
            background: #313244;
            color: #cdd6f4;
            font-size: 14px;
            width: 200px;
        }

        .controls input::placeholder { color: #6c7086; }

        #users-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .user-card {
            background: #313244;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .user-card:hover { transform: translateY(-5px); }

        .user-card h2 {
            color: #89b4fa;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .user-card p {
            font-size: 14px;
            margin: 5px 0;
        }

        #loading {
            text-align: center;
            color: #a6e3a1;
            font-size: 18px;
            margin: 20px;
        }

        .hidden { display: none; }

        #no-results {
            text-align: center;
            color: #f38ba8;
            font-size: 16px;
            margin: 20px;
        }
    </style>
</head>
<body>
    <h1>User Directory</h1>

    <div class="controls">
        <input type="text" id="search" placeholder="Search by name or email...">
        <select id="sort">
            <option value="default">Sort: Default</option>
            <option value="az">Sort: A - Z</option>
            <option value="za">Sort: Z - A</option>
        </select>
        <select id="city-filter">
            <option value="all">Filter by City</option>
        </select>
    </div>

    <div id="loading">Loading...</div>
    <div id="no-results" class="hidden">No users found.</div>
    <div id="users-container"></div>

    <script src="task12.4.js"></script>
</body>
</html>
