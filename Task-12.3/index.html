<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 12.3 - POST Requests</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: #1e1e2e;
            color: #cdd6f4;
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #89b4fa;
            margin-bottom: 30px;
        }

        .form-container {
            max-width: 500px;
            margin: 0 auto;
            background: #313244;
            padding: 30px;
            border-radius: 12px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #89b4fa;
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: none;
            background: #1e1e2e;
            color: #cdd6f4;
            font-size: 1rem;
        }

        textarea { height: 100px; resize: vertical; }

        button {
            width: 100%;
            padding: 12px;
            background: #89b4fa;
            color: #1e1e2e;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background: #74c7ec; }
        button:disabled { background: #585b70; cursor: not-allowed; }

        #result {
            max-width: 500px;
            margin: 20px auto;
            background: #313244;
            padding: 20px;
            border-radius: 12px;
            display: none;
        }

        #result h2 { color: #a6e3a1; margin-bottom: 10px; }

        pre {
            background: #1e1e2e;
            padding: 15px;
            border-radius: 8px;
            color: #a6e3a1;
            overflow-x: auto;
            font-size: 0.85rem;
        }

        #error-msg {
            max-width: 500px;
            margin: 10px auto;
            color: #f38ba8;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>

    <h1>📝 Create a New Post</h1>

    <div class="form-container">
        <label for="title">Title</label>
        <input type="text" id="title" placeholder="Enter post title..." />

        <label for="body">Content</label>
        <textarea id="body" placeholder="Enter post content..."></textarea>

        <label for="userId">User ID</label>
        <input type="number" id="userId" value="1" min="1" />

        <button id="submitBtn" onclick="handleSubmit()">
            Submit Post
        </button>
    </div>

    <div id="error-msg"></div>

    <div id="result">
        <h2>✅ Post Created Successfully!</h2>
        <pre id="result-data"></pre>
    </div>

    <script>
        // Exercise: Creating Resources
        async function createPost(title, body, userId) {
            const response = await fetch(
                "https://jsonplaceholder.typicode.com/posts",
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        title,
                        body,
                        userId
                    })
                }
            );

            if (!response.ok) {
                throw new Error("Failed to create post");
            }

            return response.json();
        }

        // Build: Form that submits a new post
        async function handleSubmit() {
            const title = document.getElementById("title").value.trim();
            const body = document.getElementById("body").value.trim();
            const userId = parseInt(document.getElementById("userId").value);
            const btn = document.getElementById("submitBtn");
            const errorMsg = document.getElementById("error-msg");
            const result = document.getElementById("result");

            // Validation
            if (!title || !body) {
                errorMsg.textContent = "Please fill in all fields!";
                errorMsg.style.display = "block";
                return;
            }

            errorMsg.style.display = "none";
            btn.disabled = true;
            btn.textContent = "Submitting...";

            try {
                const newPost = await createPost(title, body, userId);
                console.log("Created:", newPost);

                // Display result
                document.getElementById("result-data").textContent =
                    JSON.stringify(newPost, null, 2);
                result.style.display = "block";

            } catch (error) {
                errorMsg.textContent = `Error: ${error.message}`;
                errorMsg.style.display = "block";
            } finally {
                btn.disabled = false;
                btn.textContent = "Submit Post";
            }
        }
    </script>

</body>
</html>
